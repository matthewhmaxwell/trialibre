version: "3.9"

# Production compose: Trialibre + Caddy reverse proxy with auto-TLS.
# Usage:
#   1. Copy .env.example to .env and fill in CTM_API__API_KEYS, your domain, etc.
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. Caddy auto-provisions a Let's Encrypt cert for ${DOMAIN}.
# See docs/DEPLOYMENT.md for the full guide.

services:
  trialibre:
    build: .
    expose:
      - "8000"
    volumes:
      - trialibre-data:/data
    environment:
      - CTM_DATABASE__SQLITE_PATH=/data/trialibre.db
      - CTM_LLM__PROVIDER=${CTM_LLM__PROVIDER:?CTM_LLM__PROVIDER is required}
      - CTM_LLM__BASE_URL=${CTM_LLM__BASE_URL:-}
      - CTM_LLM__MODEL=${CTM_LLM__MODEL:?CTM_LLM__MODEL is required}
      - CTM_LLM__API_KEY=${CTM_LLM__API_KEY:-}
      - CTM_API__API_KEYS=${CTM_API__API_KEYS:?CTM_API__API_KEYS is required for production}
      - CTM_API__CORS_ORIGINS=${CTM_API__CORS_ORIGINS:-["https://${DOMAIN}"]}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - trialibre-net

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN is required (e.g. trialibre.example.com)}
    depends_on:
      - trialibre
    restart: unless-stopped
    networks:
      - trialibre-net

  # Optional Ollama for offline operation
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - trialibre-net
    profiles: ["local"]

networks:
  trialibre-net:

volumes:
  trialibre-data:
  caddy-data:
  caddy-config:
  ollama-models:
